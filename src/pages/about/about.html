<ion-header>
  <ion-navbar>
    <ion-title>About</ion-title>
  </ion-navbar>
</ion-header>

<ion-content padding class="about-page">
  <div class="about-shell">
    <div class="about-hero">
      <div class="about-badge">iWeather</div>
      <h1>Weather at a glance</h1>
      <p>A compact Ionic weather app built for quick status checks and saved locations.</p>
    </div>

    <ion-card class="info-card">
      <ion-card-content>
        <div class="info-list">
          <div class="info-row">
            <span class="info-label">App Name</span>
            <span class="info-value">iWeather</span>
          </div>
          <div class="info-row">
            <span class="info-label">Version</span>
            <span class="info-value">{{ appVersion }}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Description</span>
            <span class="info-value">Simple weather app</span>
          </div>
        </div>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
